<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Living Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yaldevi:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=relationships-5">
</head>
<body>
  <section class="screen" id="name-screen">
    <h1 class="screen-heading">Lets get to know each other</h1>
    <p class="screen-label">Whats your name?</p>

    <form class="pill-form" id="name-form" novalidate>
      <div class="pill-input-wrap">
        <input class="pill-input" id="name-input" type="text" autocomplete="given-name" aria-label="Your name" required>
        <button class="icon-submit" type="submit" aria-label="Continue">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 4 10.59 5.41 16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8Z"></path>
          </svg>
        </button>
      </div>
    </form>
  </section>

  <section class="screen screen--hidden" id="email-screen">
    <button class="back-btn" id="email-back-btn" aria-label="Go back">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 4 10.59 5.41 16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8Z"></path>
      </svg>
    </button>

    <h1 class="screen-heading">Nice to meet you, <span id="email-screen-name"></span></h1>
    <p class="screen-label">Whats your email?</p>

    <form class="pill-form" id="email-form" novalidate>
      <div class="pill-input-wrap">
        <input class="pill-input" id="email-input" type="email" autocomplete="email" aria-label="Your email" required>
        <button class="icon-submit" type="submit" aria-label="Continue">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 4 10.59 5.41 16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8Z"></path>
          </svg>
        </button>
      </div>
    </form>
  </section>

  <section class="screen screen--hidden" id="family-screen">
    <h1 class="screen-heading">Hi there <span id="family-screen-name"></span></h1>
    <p class="screen-label">lets find your family</p>
    <button class="find-btn" id="find-btn">Find</button>
    <p class="build-link-row">First time? <button class="link-btn" id="build-tree-btn">Build your tree</button></p>
  </section>

  <section class="screen screen--hidden" id="pin-screen">
    <button class="back-btn" id="pin-back-btn" aria-label="Go back">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 4 10.59 5.41 16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8Z"></path>
      </svg>
    </button>

    <h1 class="screen-heading">Hi there <span id="pin-screen-name"></span></h1>
    <p class="screen-label">lets find your family, enter your unique family pin</p>

    <form class="pill-form" id="pin-form" novalidate>
      <div class="pill-input-wrap">
        <input class="pill-input" id="pin-input" type="text" inputmode="numeric" aria-label="Family pin" placeholder="e.g 50332" required>
        <button class="icon-submit" type="submit" aria-label="Continue">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 4 10.59 5.41 16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8Z"></path>
          </svg>
        </button>
      </div>
    </form>
  </section>

  <section class="dashboard screen--hidden" id="dashboard">
    <div class="tree-world" id="tree-world">
      <svg class="tree-svg" id="tree-svg" aria-hidden="true"></svg>
    </div>

    <div class="relationship-layer" id="relationship-layer" aria-hidden="true"></div>
    <div class="node-layer" id="node-layer" aria-label="Family tree people"></div>

    <button class="tree-menu-btn" id="tree-menu-btn" aria-label="Menu">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 18h18v-2H3v2Zm0-5h18v-2H3v2Zm0-7v2h18V6H3Z"></path>
      </svg>
    </button>

    <div class="bottom-bar" id="bottom-bar">
      <div class="tree-bottom-pill">
        <span class="tree-logo">LOGO</span>
        <button class="tree-ask" type="button"><span aria-hidden="true">✦</span> Ask</button>
      </div>
      <div class="add-menu">
        <div class="action-row" id="action-row" aria-hidden="true">
          <button class="action-btn" type="button" aria-label="Add member">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3ZM8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3Zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13Zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5Z"></path>
            </svg>
          </button>
          <button class="action-btn" type="button" aria-label="Add story">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 3.75.4 5.25 1.25.9-.5 1.95-.75 3.25-.75 1.35 0 2.65.3 3.75.75H19c.45 0 .75-.35.75-.75V6c-.6-.45-1.25-.75-2-.95Z"></path>
            </svg>
          </button>
        </div>
        <button class="add-btn" id="add-btn" type="button" aria-label="Add" aria-expanded="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2Z"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="modal-backdrop" id="member-modal" aria-hidden="true">
      <form class="member-modal" id="member-form" role="dialog" aria-modal="true" aria-label="Add a family member">
        <button class="modal-close-btn" id="modal-close-btn" type="button" aria-label="Close">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5Zm12.6 1.4L6.4 19 5 17.6 17.6 5 19 6.4Z"></path>
          </svg>
        </button>
        <div class="member-photo"></div>
        <label for="member-name">Name</label>
        <input id="member-name" type="text" placeholder="e.g John" required>
        <label for="member-relationship">Relationship</label>
        <input id="member-relationship" type="text" placeholder="e.g Mother" required>
        <button class="find-btn modal-add-btn" type="submit">Add</button>
      </form>
    </div>
  </section>

  <script src="main.js?v=relationships-5"></script>
</body>
</html>
