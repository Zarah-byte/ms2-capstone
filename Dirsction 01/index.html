<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Living Archive — Direction 01</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yaldevi:wght@300;400;500;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <!-- D3 v7 loaded as an ES module from CDN -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ─── Site Header ──────────────────────────────────────── -->
  <header class="site-header">
    <a class="site-back" href="../index.html">← Home</a>
    <div class="site-title-group">
      <span class="site-eyebrow">Direction 01</span>
      <h1 class="site-title">The Living Archive</h1>
    </div>
    <nav class="site-nav">
      <a href="../Direction 02/index.html">Dir. 02</a>
      <a href="../Direction 03/index.html">Dir. 03</a>
    </nav>
  </header>

  <!-- ─── Tree Canvas ─────────────────────────────────────── -->
  <!-- D3 renders an SVG inside this container -->
  <div id="tree-container" class="tree-container"></div>

  <!-- ─── Panel Overlay ───────────────────────────────────── -->
  <!-- Semi-transparent backdrop; click closes the panel -->
  <div id="panel-overlay" class="panel-overlay"></div>

  <!-- ─── Story Panel ─────────────────────────────────────── -->
  <!-- Slides in from the right when a person node is clicked -->
  <aside
    id="story-panel"
    class="story-panel"
    aria-label="Story panel"
    aria-hidden="true"
  >
    <button id="panel-close" class="panel-close" aria-label="Close panel">×</button>

    <div class="panel-inner">

      <!-- Person info -->
      <header class="panel-header">
        <h2 id="panel-name" class="panel-name"></h2>
        <p  id="panel-year" class="panel-year"></p>
      </header>

      <!-- Stories list — populated by panel.js -->
      <div id="stories-list" class="stories-list"></div>

      <!-- Add a story form -->
      <section class="add-story-section">
        <h3 class="add-story-heading">Add a story</h3>
        <form id="add-story-form" class="add-story-form" novalidate>

          <label class="form-label" for="story-title">Title</label>
          <input
            class="form-input"
            type="text"
            id="story-title"
            placeholder="Give this story a name"
            required
          >

          <label class="form-label" for="story-body">Story</label>
          <textarea
            class="form-textarea"
            id="story-body"
            rows="4"
            placeholder="Write what you remember…"
            required
          ></textarea>

          <label class="form-label" for="story-era">Era</label>
          <select class="form-select" id="story-era">
            <option value="">— select a decade —</option>
            <option>1900s</option>
            <option>1910s</option>
            <option>1920s</option>
            <option>1930s</option>
            <option>1940s</option>
            <option>1950s</option>
            <option>1960s</option>
            <option>1970s</option>
            <option>1980s</option>
            <option>1990s</option>
            <option>2000s</option>
            <option>2010s</option>
            <option>2020s</option>
          </select>

          <label class="form-label" for="story-contributor">Contributor</label>
          <input
            class="form-input"
            type="text"
            id="story-contributor"
            placeholder="Your name (optional)"
          >

          <button type="submit" class="form-submit">Tuck in</button>
        </form>
      </section>

    </div><!-- /.panel-inner -->
  </aside>

  <!-- ES module entry point — imports D3 and all src/ modules -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
